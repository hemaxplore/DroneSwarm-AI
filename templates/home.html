<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>Drone AI System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated background elements */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        
        .drone {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite linear;
        }
        
        .drone:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-duration: 25s;
            font-size: 40px;
        }
        
        .drone:nth-child(2) {
            top: 60%;
            left: 80%;
            animation-duration: 30s;
            font-size: 30px;
        }
        
        .drone:nth-child(3) {
            top: 80%;
            left: 20%;
            animation-duration: 35s;
            font-size: 35px;
        }
        
        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(30px, -30px) rotate(5deg);
            }
            50% {
                transform: translate(-20px, 20px) rotate(-5deg);
            }
            75% {
                transform: translate(40px, 10px) rotate(3deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            padding: 0 20px;
            z-index: 1;
        }
        
        .logo {
            margin-bottom: 30px;
            position: relative;
        }
        
        .logo i {
            font-size: 80px;
            color: #3b82f6;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .tagline {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #94a3b8;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        
        button {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.5s ease;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(59, 130, 246, 0.5);
        }
        
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid #3b82f6;
        }
        
        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(59, 130, 246, 0.3);
        }
        
        a {
            text-decoration: none;
            display: inline-block;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 60px;
        }
        
        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 150px;
        }
        
        .feature i {
            font-size: 30px;
            color: #3b82f6;
            margin-bottom: 10px;
        }
        
        .feature p {
            font-size: 14px;
            color: #94a3b8;
        }
        
        .radar {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.2);
            bottom: -150px;
            right: -150px;
            z-index: -1;
        }
        
        .radar::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.1);
            animation: radar 3s infinite linear;
        }
        
        @keyframes radar {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .button-container {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 200px;
            }
            
            .features {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <i class="fas fa-helicopter drone"></i>
        <i class="fas fa-helicopter drone"></i>
        <i class="fas fa-helicopter drone"></i>
    </div>
    
    <div class="container">
        <div class="logo">
            <i class="fas fa-helicopter"></i>
        </div>
        
        <h1>AI Drone Monitoring System</h1>
        <p class="tagline">Advanced surveillance and monitoring powered by artificial intelligence</p>
        
        <div class="button-container">
            <a href="/login"><button class="btn-primary">Login</button></a>
            <a href="/register"><button class="btn-secondary">Register</button></a>
        </div>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-satellite-dish"></i>
                <p>Real-time Monitoring</p>
            </div>
            <div class="feature">
                <i class="fas fa-brain"></i>
                <p>AI Analysis</p>
            </div>
            <div class="feature">
                <i class="fas fa-shield-alt"></i>
                <p>Secure System</p>
            </div>
        </div>
    </div>
    
    <div class="radar"></div>
</body>
</html>
